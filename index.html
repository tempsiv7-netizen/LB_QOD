<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QUERY OF DEATH · Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Special+Elite&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#06080a; --panel:#0d1014;
  --border:rgba(0,180,255,0.1); --border2:rgba(0,180,255,0.05);
  --blue:#0af; --blue2:#00cfff; --red2:#e74c3c;
  --gold:#f0c040; --silver:#9ab; --bronze:#a0622a;
  --text:#c8dde8; --muted:#3a5060; --muted2:#1e2c34;
  --accent:#00aaff; --warn:#ff4444; --green:#00cc66;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background:var(--bg); color:var(--text);
  font-family:'Share Tech Mono', monospace;
  min-height:100vh; overflow-x:hidden;
}

/* CRT scanline */
body::after{
  content:''; position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);
  pointer-events:none; z-index:10;
}

/* Ambient glow blobs */
.blob{ position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; opacity:.07; }
.b1{ width:600px; height:600px; background:#0044aa; top:-200px; left:-150px; animation:b1 14s ease-in-out infinite; }
.b2{ width:400px; height:400px; background:#aa0000; bottom:-100px; right:-100px; animation:b2 18s ease-in-out infinite; }
@keyframes b1{ 0%,100%{ transform:translate(0,0) } 50%{ transform:translate(60px,50px) } }
@keyframes b2{ 0%,100%{ transform:translate(0,0) } 50%{ transform:translate(-40px,-50px) } }

.page{ position:relative; z-index:20; max-width:1040px; margin:0 auto; padding:30px 20px 80px; }

/* ── HEADER ── */
.hdr{ text-align:center; padding:36px 20px 28px; border-bottom:1px solid var(--border2); margin-bottom:4px; }
.ev-name{
  font-family:'Special Elite', cursive;
  font-size:clamp(2rem,6vw,4rem);
  color:#fff; letter-spacing:4px; text-transform:uppercase;
  text-shadow:0 0 40px rgba(0,170,255,.3), 0 0 80px rgba(0,170,255,.1);
  margin-bottom:4px; line-height:1;
}
.ev-sub{
  font-size:.7rem; letter-spacing:6px; text-transform:uppercase;
  color:var(--red2); margin-bottom:20px;
}
.live-pill{
  display:inline-flex; align-items:center; gap:9px;
  background:rgba(0,170,255,.05); border:1px solid rgba(0,170,255,.15);
  border-radius:2px; padding:7px 20px;
}
.ldot{ width:8px; height:8px; border-radius:50%; background:var(--red2); animation:lp 1.4s ease-in-out infinite; }
@keyframes lp{ 0%,100%{ box-shadow:0 0 0 0 rgba(231,76,60,.7) } 50%{ box-shadow:0 0 0 6px transparent } }
.ldot.ok{ background:var(--green); animation:lp2 2s ease-in-out infinite; }
@keyframes lp2{ 0%,100%{ box-shadow:0 0 0 0 rgba(0,204,102,.5) } 50%{ box-shadow:0 0 0 5px transparent } }
.ldot.err{ background:var(--warn); animation:none; }
.ldot.wait{ background:var(--muted); animation:none; }
.ltxt{ font-size:.65rem; letter-spacing:3px; text-transform:uppercase; color:var(--accent); }
.refresh-btn{
  background:none; border:1px solid rgba(0,170,255,.2); border-radius:2px;
  color:var(--accent); padding:4px 12px;
  font-family:'Share Tech Mono', monospace; font-size:.65rem;
  letter-spacing:2px; cursor:pointer; margin-left:8px;
  transition:background .2s; display:inline-flex; align-items:center; gap:5px;
}
.refresh-btn:hover{ background:rgba(0,170,255,.1); }
.refresh-icon{ display:inline-block; }
.spinning .refresh-icon{ animation:spin .7s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg) } }

/* ── DIVIDER ── */
.divider{
  display:flex; align-items:center; gap:14px;
  margin:28px 0 16px;
  font-size:.58rem; letter-spacing:5px; text-transform:uppercase; color:var(--muted);
}
.divider::before,.divider::after{ content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--border2),transparent); }

/* ── TICKER ── */
.ticker{ overflow:hidden; border-top:1px solid var(--border2); border-bottom:1px solid var(--border2); padding:7px 0; margin-bottom:24px; white-space:nowrap; background:rgba(0,0,0,.2); }
.ti{ display:inline-block; animation:tick 26s linear infinite; }
.tic{ display:inline-block; margin:0 28px; font-size:.68rem; letter-spacing:2px; color:var(--muted); }
.tic b{ color:var(--accent); }
@keyframes tick{ from{ transform:translateX(0) } to{ transform:translateX(-50%) } }

/* ── PODIUM ── */
#podium{ display:none; justify-content:center; align-items:flex-end; gap:14px; margin-bottom:36px; }
.pc{
  position:relative; text-align:center; border-radius:2px;
  padding:22px 16px 36px; min-width:158px; max-width:192px;
  transition:transform .3s; overflow:hidden; flex:0 0 auto;
}
.pc:hover{ transform:translateY(-6px); }
.pc::before{ content:''; position:absolute; inset:0; background:linear-gradient(160deg,rgba(255,255,255,.025),transparent); pointer-events:none; }
.pc.r1{ min-height:220px; background:linear-gradient(175deg,#0a1020,#050810); border:1px solid rgba(0,170,255,.3); box-shadow:0 0 40px rgba(0,170,255,.07),inset 0 1px 0 rgba(0,170,255,.15); }
.pc.r2{ min-height:185px; background:linear-gradient(175deg,#0e1418,#080c0f); border:1px solid rgba(154,187,187,.15); }
.pc.r3{ min-height:165px; background:linear-gradient(175deg,#120e08,#0a0806); border:1px solid rgba(160,98,42,.18); }
.pm{ font-size:1.8rem; margin-bottom:6px; }
.p-team{ font-family:'Special Elite',cursive; font-size:.78rem; letter-spacing:2px; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:152px; margin:0 auto 5px; color:#cde; }
.p-members{ font-size:.64rem; color:var(--muted); line-height:1.6; margin-bottom:5px; }
.p-members span{ display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:150px; margin:0 auto; }
.ps{ font-family:'Share Tech Mono',monospace; font-size:1.65rem; font-weight:700; margin-top:4px; margin-bottom:6px; }
.pc.r1 .ps{ color:var(--blue2); text-shadow:0 0 14px rgba(0,207,255,.4); }
.pc.r2 .ps{ color:var(--silver); }
.pc.r3 .ps{ color:var(--bronze); }
.pl{ position:absolute; bottom:0; left:0; right:0; font-size:.48rem; letter-spacing:4px; text-transform:uppercase; padding:6px 4px; color:var(--muted2); background:rgba(0,0,0,.3); }

/* ── TABLE ── */
#tsec{ display:none; }
.tbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:13px; flex-wrap:wrap; gap:8px; }
.tlbl{ font-family:'Special Elite',cursive; font-size:.9rem; letter-spacing:3px; text-transform:uppercase; color:var(--accent); }
#search{
  background:rgba(0,0,0,.5); border:1px solid var(--border); border-radius:2px;
  color:var(--text); padding:8px 14px;
  font-family:'Share Tech Mono',monospace; font-size:.78rem;
  outline:none; width:190px; transition:border-color .2s;
}
#search:focus{ border-color:var(--blue); }
#search::placeholder{ color:var(--muted); }
.twrap{ background:var(--panel); border:1px solid var(--border); border-radius:2px; overflow:hidden; box-shadow:0 4px 40px rgba(0,0,0,.6); }
table{ width:100%; border-collapse:collapse; }
thead tr{ background:linear-gradient(90deg,rgba(0,170,255,.06),transparent); border-bottom:1px solid var(--border); }
thead th{ font-size:.52rem; letter-spacing:4px; text-transform:uppercase; color:var(--muted); padding:13px 16px; text-align:left; font-weight:400; }
thead th.r{ text-align:right; }
tbody tr{ border-bottom:1px solid var(--border2); transition:background .15s; animation:rf .4s ease both; }
@keyframes rf{ from{ opacity:0; transform:translateX(-8px) } to{ opacity:1; transform:none } }
tbody tr:last-child{ border-bottom:none; }
tbody tr:hover{ background:rgba(0,170,255,.025); }
tbody tr.rk1{ background:rgba(0,170,255,.03); }
tbody tr.rk2{ background:rgba(154,187,187,.02); }
tbody tr.rk3{ background:rgba(160,98,42,.02); }
td{ padding:13px 16px; font-size:.9rem; vertical-align:middle; }
td.r{ text-align:right; font-variant-numeric:tabular-nums; }
.rc{ font-size:.88rem; width:48px; color:var(--muted); }
.rc.t{ color:var(--text); }
.team-name{ font-family:'Special Elite',cursive; font-size:1rem; line-height:1.2; color:#cde; }
.team-members{ font-size:.7rem; color:var(--muted); margin-top:4px; }
.member-tag{ display:inline-block; background:rgba(0,170,255,.05); border:1px solid rgba(0,170,255,.12); border-radius:2px; padding:1px 9px; margin:2px 3px 0 0; font-size:.66rem; color:#5a90aa; white-space:nowrap; }
.sc{ font-size:.92rem; font-weight:700; color:var(--blue2); }
.bw{ background:rgba(255,255,255,.04); border-radius:1px; height:3px; margin-top:5px; overflow:hidden; }
.bf{ height:100%; border-radius:1px; background:linear-gradient(90deg,var(--red2),var(--blue)); transition:width .7s cubic-bezier(.4,0,.2,1); }
.rv{ color:#406070; font-size:.86rem; }
.r1b{ color:#5aaa7a; } .r2b{ color:#5a8aaa; } .r3b{ color:#aa5a8a; }

/* ── TOAST ── */
.toast{
  position:fixed; bottom:24px; right:24px;
  background:rgba(0,170,255,.08); border:1px solid rgba(0,170,255,.25);
  border-radius:2px; padding:10px 20px;
  font-size:.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--blue2);
  opacity:0; transform:translateY(8px); transition:all .35s;
  pointer-events:none; z-index:1000;
}
.toast.show{ opacity:1; transform:translateY(0); }

/* ── FOOTER ── */
.rfinfo{ text-align:center; margin-top:28px; font-size:.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.rfinfo span{ color:var(--accent); }

/* ── LOADING ── */
#msgst{ text-align:center; padding:70px 20px; color:var(--muted); }
#msgst .ico{ font-size:2.8rem; margin-bottom:14px; }
#msgst p{ font-size:.78rem; line-height:2; letter-spacing:1px; }
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="page">

  <!-- HEADER -->
  <div class="hdr">
    <div class="ev-name">Query of Death</div>
    <div class="ev-sub">Debugging a Murder · Live Rankings</div>
    <div class="live-pill">
      <div class="ldot wait" id="ldot"></div>
      <span class="ltxt" id="ltxt">Connecting…</span>
      <button class="refresh-btn" id="rbtn" onclick="manualRefresh()">
        <span class="refresh-icon">↻</span> Refresh
      </button>
    </div>
  </div>

  <!-- SCORE TICKER -->
  <div class="ticker" id="ticker" style="display:none">
    <div class="ti" id="tinner"></div>
  </div>

  <!-- PODIUM -->
  <div class="divider">— Top Investigators —</div>
  <div id="podium"></div>

  <!-- TABLE -->
  <div class="divider">— All Detective Squads —</div>
  <div id="tsec">
    <div class="tbar">
      <span class="tlbl">🔎 Investigation Log</span>
      <input type="text" id="search" placeholder="Search squad / member…" oninput="renderTable()"/>
    </div>
    <div class="twrap">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="msgst">
    <div class="ico">🔍</div>
    <p>Connecting to evidence server…</p>
  </div>

  <div class="rfinfo">Auto-refresh in <span id="cd">30</span>s · Google Sheets</div>
</div>

<div class="toast" id="toast">📡 Scores Updated</div>

<script>
/* ─────────────────────────────────────────────
   CONFIG — Apps Script fetches live from your
   "leaderboard" sheet tab automatically
   ───────────────────────────────────────────── */
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTzc6CB0FzC5dGcJwNq0TvdbtwQN2cK3EUA41EIcZ_BgQf75zioUlq6wAggZlHqKkH4A/exec";
const TEAM_COL    = "Team Name";
const MEMBER_COLS = ["Member 1", "Member 2", "Member 3"];
const SCORE_COLS  = ["Round 1", "Round 2", "Round 3"];
const REFRESH_SEC = 30;
const ROUND_LABELS  = { "Round 1":"Case I 📁", "Round 2":"Case II 🗂", "Round 3":"Case III 🔐" };
const ROUND_CLASSES = { "Round 1":"r1b", "Round 2":"r2b", "Round 3":"r3b" };

let allRows = [], hdrs = [], prevHash = '', cd = REFRESH_SEC;

/* ── BOOT ── */
window.onload = () => {
  fetchData();
  setInterval(() => { fetchData(); cd = REFRESH_SEC; }, REFRESH_SEC * 1000);
  setInterval(() => { cd = Math.max(0, cd - 1); document.getElementById('cd').textContent = cd; }, 1000);
};

/* ── MANUAL REFRESH ── */
function manualRefresh() {
  const btn = document.getElementById('rbtn');
  btn.classList.add('spinning');
  fetchData().finally(() => setTimeout(() => btn.classList.remove('spinning'), 700));
  cd = REFRESH_SEC;
}

/* ── FETCH ── */
async function fetchData() {
  setDot('wait', 'Syncing…');
  try {
    const res = await fetch(APPS_SCRIPT_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    processJSON(await res.json());
  } catch (e) {
    console.error(e);
    if (allRows.length > 0) {
      setDot('wait', 'Reconnecting… showing last data');
    } else {
      setDot('err', 'Cannot access evidence server');
      document.getElementById('msgst').style.display = 'block';
      document.getElementById('msgst').innerHTML = `
        <div class="ico">⚠️</div>
        <p>Cannot connect to Google Sheets.<br>
        Make sure Apps Script is deployed with<br>
        <b>"Who has access" → "Anyone"</b>.<br><br>
        Will retry in ${REFRESH_SEC}s…</p>`;
    }
  }
}

/* ── PROCESS JSON ── */
function processJSON(data) {
  try {
    if (!data || data.length < 2) return;
    hdrs = data[0].map(h => String(h).trim());

    const newRows = data.slice(1)
      .filter(r => r.some(c => String(c).trim() !== ''))
      .map(r => {
        const obj = {};
        hdrs.forEach((h, i) => obj[h] = String(r[i] ?? '').trim());
        let total = 0;
        SCORE_COLS.forEach(sc => {
          const v = parseFloat(String(obj[sc] || '').replace(/[^0-9.-]/g, ''));
          if (!isNaN(v)) total += v;
        });
        obj.__total__ = Math.round(total * 100) / 100;
        return obj;
      })
      .filter(r => r[TEAM_COL]?.length > 0);

    if (!newRows.length) return;
    newRows.sort((a, b) => b.__total__ - a.__total__);

    const hash = JSON.stringify(newRows.map(r => [r[TEAM_COL], r.__total__, ...SCORE_COLS.map(s => r[s])]));
    const changed = hash !== prevHash && prevHash !== '';
    prevHash = hash;
    allRows = newRows;

    renderPodium();
    renderTable();
    renderTicker();

    document.getElementById('podium').style.display = 'flex';
    document.getElementById('tsec').style.display = 'block';
    document.getElementById('msgst').style.display = 'none';
    document.getElementById('ticker').style.display = 'block';
    setDot('ok', `Live · ${allRows.length} squads · ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`);
    if (changed) showToast();

  } catch (e) {
    console.error(e);
    if (allRows.length > 0) setDot('wait', 'Parse error · showing last data');
  }
}

/* ── HELPERS ── */
function getMembers(row) { return MEMBER_COLS.map(c => row[c] || '').filter(Boolean); }
function setDot(s, msg) {
  document.getElementById('ldot').className = 'ldot' + (s === 'ok' ? ' ok' : s === 'err' ? ' err' : ' wait');
  document.getElementById('ltxt').textContent = msg;
}
function x(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
let toastTimer;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ── PODIUM ── */
function renderPodium() {
  const p = document.getElementById('podium');
  if (!allRows.length) { p.style.display = 'none'; return; }
  const order = [allRows[1], allRows[0], allRows[2]];
  const cls = ['r2', 'r1', 'r3'], medals = ['🥈', '🥇', '🥉'];
  const labels = ['Senior Investigator', 'Lead Investigator', 'Junior Investigator'];
  p.innerHTML = order.map((row, i) => {
    if (!row) return '';
    const m = getMembers(row);
    return `<div class="pc ${cls[i]}">
      <div class="pm">${medals[i]}</div>
      <div class="p-team">${x(row[TEAM_COL])}</div>
      <div class="p-members">${m.map(n => `<span>${x(n)}</span>`).join('')}</div>
      <div class="ps">${row.__total__}</div>
      <div class="pl">${labels[i]}</div>
    </div>`;
  }).join('');
}

/* ── TABLE ── */
function renderTable() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const max = allRows.length ? Math.max(allRows[0].__total__, 1) : 1;
  const sc = SCORE_COLS.filter(c => hdrs.includes(c));

  document.getElementById('thead').innerHTML =
    `<tr><th>Rank</th><th>Squad</th>${sc.map(c => `<th class="r">${ROUND_LABELS[c] || c}</th>`).join('')}<th class="r">Total</th></tr>`;

  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  let shown = 0;

  allRows.forEach((row, idx) => {
    const rank = idx + 1;
    const m = getMembers(row);
    if (q && !(row[TEAM_COL] + ' ' + m.join(' ')).toLowerCase().includes(q)) return;
    shown++;
    const pct = ((row.__total__ / max) * 100).toFixed(1);
    const ri = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
    const rCells = sc.map(c => {
      const v = parseFloat(String(row[c] || '').replace(/[^0-9.-]/g, ''));
      return `<td class="r rv ${ROUND_CLASSES[c] || ''}">${isNaN(v) ? (row[c] || '—') : v}</td>`;
    }).join('');

    tb.innerHTML += `<tr class="${rank <= 3 ? 'rk' + rank : ''}" style="animation-delay:${(shown * .035).toFixed(2)}s">
      <td class="rc${rank <= 3 ? ' t' : ''}">${ri}</td>
      <td>
        <div class="team-name">${x(row[TEAM_COL])}</div>
        ${m.length ? `<div class="team-members">${m.map(n => `<span class="member-tag">${x(n)}</span>`).join('')}</div>` : ''}
      </td>
      ${rCells}
      <td class="r sc">${row.__total__}
        <div class="bw"><div class="bf" style="width:${pct}%"></div></div>
      </td>
    </tr>`;
  });

  if (!shown) tb.innerHTML = `<tr><td colspan="99" style="text-align:center;padding:28px;color:var(--muted)">No squads found.</td></tr>`;
}

/* ── TICKER ── */
function renderTicker() {
  const items = allRows.map((r, i) => {
    const m = getMembers(r);
    return `<span class="tic">🔍 #${i + 1} <b>${x(r[TEAM_COL])}</b>${m.length ? ' · ' + m.join(', ') : ''} · ${r.__total__}pts</span>`;
  }).join('');
  const inn = document.getElementById('tinner');
  inn.innerHTML = items + items;
  inn.style.animationDuration = Math.max(18, allRows.length * 2.8) + 's';
}
</script>
</body>
</html>
